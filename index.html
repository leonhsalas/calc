<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="calculadora">
        <div id="container-pantalla">
            <div id="pantalla">0</div>
        </div>
        <div id="buttons">
            <div class="row">
                <div class="boton special border">
                    <p>(</p>
                </div>
                <div class="boton special border">
                    <p>)</p>
                </div>
                <div class="boton operador border">
                    <p>%</p>
                </div>
                <div class="boton special border">
                    <p>AC</p>
                </div>
            </div>
            <div class="row">
                <div class="boton numero border">
                    <p>1</p>
                </div>
                <div class="boton numero border">
                    <p>2</p>
                </div>
                <div class="boton numero border">
                    <p>3</p>
                </div>
                <div class="boton operador border">
                    <p>÷</p>
                </div>
            </div>
            <div class="row">
                <div class="boton numero border">
                    <p>4</p>
                </div>
                <div class="boton numero border">
                    <p>5</p>
                </div>
                <div class="boton numero border">
                    <p>6</p>
                </div>
                <div class="boton operador border">
                    <p>x</p>
                </div>
            </div>
            <div class="row">
                <div class="boton numero border">
                    <p>7</p>
                </div>
                <div class="boton numero border">
                    <p>8</p>
                </div>
                <div class="boton numero border">
                    <p>9</p>
                </div>
                <div class="boton operador border">
                    <p>-</p>
                </div>
            </div>
            <div class="row">
                <div class="boton numero border">
                    <p>0</p>
                </div>
                <div class="boton numero border">
                    <p>.</p>
                </div>
                <div class="boton igual border">
                    <p>=</p>
                </div>
                <div class="boton operador border">
                    <p>+</p>
                </div>
            </div>
        </div>
    </div>
    <script src="calculadora.js"></script>
</body>
</html>
